name: Check Resource Availability

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Convert YAML to JSON
        run: python scripts/yaml_to_json.py

      - name: Run availability check
        run: python scripts/check_availability.py

      - name: Build Pages data
        run: python scripts/build_docs_data.py

      - name: Run tests and drift check
        run: |
          python -m unittest discover
          python scripts/build_docs_data.py --check

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json data/resources.json docs/status.json docs/resources.json
          git diff --staged --quiet || git commit -m "chore: update resource status [$(date -u +%Y-%m-%d)]"
          git push
